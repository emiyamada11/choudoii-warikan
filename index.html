<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ちょうどいい割り勘計算アプリ</title>
    <!-- 丸みのある可愛い日本語フォント（M PLUS Rounded 1c）を読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* --- 全体の基本スタイル（CSS） --- */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'M PLUS Rounded 1c', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: #4a4a4a;
            position: relative;
            overflow-x: hidden;
            /* 夜空を感じさせるグラデーション背景 */
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #2b1e3a 100%);
        }

        /* --- 流れ星（キャンバス）背景 --- */
        #star-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 下の要素の操作を邪魔しない */
            z-index: 0;
        }

        /* アプリ本体のコンテナ */
        .container {
            position: relative;
            z-index: 1; /* 流れ星の上に表示 */
            background-color: rgba(255, 255, 255, 0.93); /* 少し透け感を出して幻想的に */
            backdrop-filter: blur(8px);
            max-width: 520px;
            width: 100%;
            padding: 35px 28px;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.3), 0 0 20px rgba(168, 192, 255, 0.2);
            margin: 20px 0;
            border: 2px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: #3b3a5c;
            margin-top: 0;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        /* タイトル下の説明文 */
        .app-description {
            font-size: 13.5px;
            line-height: 1.6;
            color: #6b6a8a;
            text-align: center;
            background-color: #f0f3fa;
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-weight: 400;
            border: 1px dashed #c0cae8;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            font-size: 14px;
            color: #4a4870;
        }

        input[type="number"], input[type="text"], select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e1e6f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: #fbfcfd;
            transition: all 0.25s ease;
            outline: none;
            color: #333;
        }

        input[type="number"]:focus, input[type="text"]:focus, select:focus {
            border-color: #7b88ff;
            box-shadow: 0 0 8px rgba(123, 136, 255, 0.3);
            background-color: #fff;
        }

        /* ボタンデザイン */
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 700;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            box-shadow: 0 6px 18px rgba(108, 92, 231, 0.35);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 22px rgba(108, 92, 231, 0.45);
        }

        button:active {
            transform: translateY(0);
        }

        /* メンバーごとの入力行のデザイン */
        .member-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
        }
        .member-row input { flex: 2; }
        .member-row select { flex: 1.3; }

        /* 計算結果の表示エリア */
        #result-area {
            margin-top: 32px;
            padding-top: 22px;
            border-top: 2px dashed #d6dcee;
        }

        .result-title {
            font-size: 19px;
            font-weight: 800;
            color: #3b3a5c;
            margin-bottom: 18px;
            text-align: center;
        }

        .result-item {
            background: linear-gradient(135deg, #ffffff 0%, #f4f6fd 100%);
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 6px solid #6c5ce7;
            box-shadow: 0 3px 10px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-name {
            font-weight: 700;
            font-size: 16px;
            color: #4a4870;
        }

        .result-amount {
            font-size: 24px; /* デカデカと表示 */
            font-weight: 800;
            color: #ff5e7e;
        }
    </style>
</head>
<body>

<!-- 流れ星と星空を描画する背景キャンバス -->
<canvas id="star-canvas"></canvas>

<div class="container">
    <h1>ちょうどいい割り勘計算アプリ</h1>
    
    <!-- 指定いただいた説明文 -->
    <div class="app-description">
        先輩だから多めに払いたい／遅刻した人に少なめに払わせたい…人によって多め・少なめ設定が使える割り勘計算アプリです。
    </div>

    <!-- ステップ1: 基本情報の入力 -->
    <div class="form-group">
        <label for="total-amount">全体の合計金額 (円)</label>
        <input type="number" id="total-amount" placeholder="例: 12000" min="0">
    </div>

    <div class="form-group">
        <label for="total-people">全体の人数 (人)</label>
        <input type="number" id="total-people" placeholder="例: 4" min="1" oninput="generateMemberInputs()">
    </div>

    <!-- ステップ2: メンバーごとの設定（人数に応じてJavaScriptが自動生成） -->
    <div class="form-group">
        <div id="member-list-container"></div>
    </div>

    <button id="calc-btn" onclick="calculateBill()" style="display: none;">計算する</button>

    <!-- ステップ3: 結果表示エリア -->
    <div id="result-area" style="display: none;">
        <div class="result-title">✨ 精算結果 ✨</div>
        <div id="result-list"></div>
    </div>
</div>

<script>
    // --- 処理の解説（JavaScript） ---

    // 人数が入力されたら、その人数分の名前＆比率入力欄を画面に作り出す関数
    function generateMemberInputs() {
        const peopleCount = parseInt(document.getElementById('total-people').value);
        const container = document.getElementById('member-list-container');
        const calcBtn = document.getElementById('calc-btn');
        
        // 一旦中身を空っぽにする
        container.innerHTML = '';
        
        // 人数が正しい値（1以上）じゃなければボタンを隠して終了
        if (isNaN(peopleCount) || peopleCount < 1) {
            calcBtn.style.display = 'none';
            return;
        }

        // ラベルを追加
        const label = document.createElement('label');
        label.innerText = 'メンバーの名前と比率を設定してください';
        container.appendChild(label);

        // 人数分の入力項目（名前のテキスト欄 ＋ 比率のセレクトボックス）をループで生成
        for (let i = 1; i <= peopleCount; i++) {
            const row = document.createElement('div');
            row.className = 'member-row';

            // 名前の入力欄
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = `メンバー ${i}`;
            nameInput.className = 'member-name';
            
            // 比率の選択肢
            const ratioSelect = document.createElement('select');
            ratioSelect.className = 'member-ratio';
            
            // 選択肢の中身を定義（valueが計算に使われる倍率になります）
            const options = [
                { text: 'ふつうに払う人 (1.0倍)', value: 1.0 },
                { text: '少なめに払う人 (0.8倍)', value: 0.8 },
                { text: '少なめに払う人 (0.5倍)', value: 0.5 },
                { text: '多めに払う人 (1.2倍)', value: 1.2 },
                { text: '多めに払う人 (1.5倍)', value: 1.5 },
                { text: '多めに払う人 (2.0倍)', value: 2.0 }
            ];

            // 選択肢をセレクトボックスに追加
            options.forEach(opt => {
                const option = document.createElement('option');
                option.text = opt.text;
                option.value = opt.value;
                ratioSelect.appendChild(option);
            });

            // 行にドッキング
            row.appendChild(nameInput);
            row.appendChild(ratioSelect);
            container.appendChild(row);
        }

        // 入力欄ができたら計算ボタンを表示する
        calcBtn.style.display = 'block';
    }

    // 割り勘の具体的な金額を計算するメインの関数
    function calculateBill() {
        const totalAmount = parseInt(document.getElementById('total-amount').value);
        const nameInputs = document.querySelectorAll('.member-name');
        const ratioSelects = document.querySelectorAll('.member-ratio');
        
        // バリデーション（金額が空などのエラーチェック）
        if (isNaN(totalAmount) || totalAmount <= 0) {
            alert('有効な合計金額を入力してください。');
            return;
        }

        // 1. 全員の比率（重み）の合計値を割り出す
        let totalRatio = 0;
        ratioSelects.forEach(select => {
            totalRatio += parseFloat(select.value);
        });

        // 2. 「比率1.0（ふつう）」あたりの基準となる金額を計算する
        const baseAmount = totalAmount / totalRatio;

        let calculatedTotal = 0;
        const results = [];

        // 3. 各自の仮の支払額を計算（10円単位で切り上げ）
        nameInputs.forEach((input, index) => {
            const name = input.value.trim() || `メンバー ${index + 1}`;
            const ratio = parseFloat(ratioSelects[index].value);
            
            // 基準金額にそれぞれの比率を掛け算し、10円単位で切り上げる
            // 例: 2345円 → Math.ceil(234.5) * 10 = 2350円
            let amount = Math.ceil((baseAmount * ratio) / 10) * 10;
            
            calculatedTotal += amount;
            
            results.push({ name: name, amount: amount });
        });

        // 4. 端数調整（切り上げによって発生した実際の合計金額との「ズレ」を調整）
        // 10円単位での切り上げなので、大抵は数十円〜数百円ほど多く計算されます。
        let diff = calculatedTotal - totalAmount;
        
        // ズレ（余り）がある場合は、最初のメンバーから順に10円ずつ引いて調整する
        let i = 0;
        while (diff > 0) {
            results[i % results.length].amount -= 10;
            diff -= 10;
            i++;
        }

        // 5. 計算結果を画面にデカデカと表示する
        const resultList = document.getElementById('result-list');
        resultList.innerHTML = ''; // 前回の結果をクリア

        results.forEach(res => {
            const div = document.createElement('div');
            div.className = 'result-item';
            div.innerHTML = `
                <span class="result-name">${res.name}</span>
                <span class="result-amount">${res.amount.toLocaleString()} 円</span>
            `;
            resultList.appendChild(div);
        });

        // 結果エリアを隠し状態から表示状態にする
        document.getElementById('result-area').style.display = 'block';
    }


    // --- 流れ星＆星空のアニメーション処理（HTML5 Canvas） ---
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    // 背景のキラキラした小さな星たちのデータ生成
    const backgroundStars = [];
    for (let i = 0; i < 70; i++) {
        backgroundStars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 1.5,
            alpha: Math.random(),
            speed: Math.random() * 0.02 + 0.005
        });
    }

    // 流れ星クラス
    class ShootingStar {
        constructor() {
            this.reset();
        }

        reset() {
            this.x = Math.random() * width * 1.2;
            this.y = -20;
            this.length = Math.random() * 80 + 60;
            this.speed = Math.random() * 10 + 6;
            this.size = Math.random() * 1.5 + 1;
            // 綺麗なパステルグラデーション系の流れ星カラー
            const colors = ['#ffffff', '#a29bfe', '#74b9ff', '#ffeaa7', '#ff7675'];
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.active = false;
            this.wait = Math.random() * 120 + 20; // 流れるタイミングのズレ
        }

        update() {
            if (!this.active) {
                this.wait--;
                if (this.wait <= 0) {
                    this.active = true;
                }
                return;
            }

            // 斜め右下に流れる
            this.x -= this.speed * 1.2;
            this.y += this.speed;

            // 画面外に出たらリセット
            if (this.y > height + 100 || this.x < -100) {
                this.reset();
            }
        }

        draw() {
            if (!this.active) return;

            // 流れ星の尾を描画（グラデーション）
            const tailX = this.x + this.length * 1.2;
            const tailY = this.y - this.length;

            const gradient = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
            gradient.addColorStop(0, this.color);
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(tailX, tailY);
            ctx.strokeStyle = gradient;
            ctx.lineWidth = this.size;
            ctx.lineCap = 'round';
            ctx.stroke();

            // 先端の光る点
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 1.2, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = this.color;
            ctx.fill();
            ctx.shadowBlur = 0; // リセット
        }
    }

    // 流れ星を複数作成
    const shootingStars = Array.from({ length: 4 }, () => new ShootingStar());

    // 毎フレームのアニメーション描画ループ
    function animate() {
        ctx.clearRect(0, 0, width, height);

        // 1. 背景の星のチラつき描画
        backgroundStars.forEach(star => {
            star.alpha += star.speed;
            if (star.alpha > 1 || star.alpha < 0) {
                star.speed = -star.speed;
            }
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.abs(star.alpha)})`;
            ctx.fill();
        });

        // 2. 流れ星の描画と更新
        shootingStars.forEach(star => {
            star.update();
            star.draw();
        });

        requestAnimationFrame(animate);
    }

    // アニメーションスタート
    animate();
</script>

</body>
</html>
